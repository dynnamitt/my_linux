# kitty.conf
# Full reference: https://sw.kovidgoyal.net/kitty/conf/
# Theme: Base2Tone Field Dark by Bram de Haan (MIT)
#   https://github.com/atelierbram/Base2Tone-kitty

# ── Fonts ──────────────────────────────────────────────────────────
# Requires: FiraCode Nerd Font — https://www.nerdfonts.com
# Falls back to system monospace automatically if missing
#   Arch/Manjaro: pacman -S ttf-firacode-nerd
#   Brew:    brew install font-fira-code-nerd-font
#   Fedora immutable (no brew):
#     curl -fLO https://github.com/ryanoasis/nerd-fonts/releases/latest/download/FiraCode.zip
#     unzip FiraCode.zip -d ~/.local/share/fonts && fc-cache -fv

font_family      family="FiraCode Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14

# ── Colors (Base2Tone Field Dark + overrides) ──────────────────────

foreground          #8ea4a0
background          #18201e
selection_foreground #8ea4a0
selection_background #242e2c

cursor              #00943e
cursor_text_color   #18201e

url_color           #88f2e0

# black
color0  #18201e
color8  #5a6d6a
# red
color1  #0fbda0
color9  #55ec94
# green
color2  #3be381
color10 #242e2c
# yellow
color3  #85ffb8
color11 #42524f
# blue
color4  #25d0b4
color12 #667a77
# magenta
color5  #3be381
color13 #88f2e0
# cyan
color6  #40ddc3
color14 #25d46e
# white
color7  #8ea4a0
color15 #a8fff1

mark1_foreground    #18201e
mark1_background    #089b83
mark2_foreground    #18201e
mark2_background    #78877e
mark3_foreground    #18201e
mark3_background    #0eaa4f

# ── Window ─────────────────────────────────────────────────────────

background_opacity      0.92
window_border_width     3pt
window_padding_width    3
active_border_color     #ff8c00
inactive_border_color   #5c0000
bell_border_color       #037764
visual_bell_color       none
wayland_titlebar_color  #242e2c
macos_titlebar_color    #242e2c

# ── Tab Bar ────────────────────────────────────────────────────────

tab_bar_edge            bottom
tab_bar_margin_height   12.0 8.0
tab_bar_style           powerline
tab_powerline_style     round
tab_bar_margin_color    #18201e
tab_bar_background      #242e2c
active_tab_foreground   #ff8c00
active_tab_background   #3a2000
active_tab_font_style   bold
inactive_tab_foreground #d3d3d3
inactive_tab_background #242e2c
tab_title_template      " {index}: {title} "

# ── Bell ───────────────────────────────────────────────────────────

enable_audio_bell no

# ── Remote Control ─────────────────────────────────────────────────

allow_remote_control yes

# ── Key Bindings ───────────────────────────────────────────────────

map kitty_mod+0 change_font_size all -1.0
map kitty_mod+d next_window
map kitty_mod+a previous_window
